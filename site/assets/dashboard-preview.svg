<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 620" role="img" aria-labelledby="title desc">
  <title id="title">Relaywright dashboard preview</title>
  <desc id="desc">A stylized Relaywright operational dashboard showing listener status, queue health, backup readiness, and recent events.</desc>
  <rect width="980" height="620" rx="18" fill="#f8fbfc"/>
  <rect x="24" y="24" width="210" height="572" rx="12" fill="#ffffff" stroke="#d9e2e5"/>
  <rect x="54" y="58" width="42" height="42" rx="9" fill="#e6f6f8"/>
  <path d="M62 87h22l9-20 9 20h12" fill="none" stroke="#088090" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="112" y="76" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#283038">Relaywright</text>
  <text x="112" y="97" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#68757d">Local forwarding console</text>
  <g font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#283038">
    <rect x="44" y="145" width="170" height="44" rx="8" fill="#e6f6f8" stroke="#b8dfe5"/>
    <text x="64" y="172" font-weight="700">Overview</text>
    <text x="64" y="230">Settings</text>
    <text x="64" y="286">Operations</text>
    <text x="64" y="342">System</text>
    <text x="64" y="398">Diagnostics</text>
  </g>
  <rect x="258" y="24" width="698" height="572" rx="12" fill="#ffffff" stroke="#d9e2e5"/>
  <text x="292" y="76" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="750" fill="#283038">Dashboard</text>
  <text x="292" y="104" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#68757d">SMTP intake, delivery, backups, and runtime status at a glance.</text>
  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="292" y="142" width="196" height="116" rx="8" fill="#ffffff" stroke="#d9e2e5"/>
    <text x="312" y="174" font-size="13" font-weight="700" fill="#68757d">SMTP Listener</text>
    <text x="312" y="214" font-size="30" font-weight="750" fill="#088090">Running</text>
    <text x="312" y="238" font-size="13" fill="#68757d">Port 25, STARTTLS ready</text>
    <rect x="512" y="142" width="196" height="116" rx="8" fill="#ffffff" stroke="#d9e2e5"/>
    <text x="532" y="174" font-size="13" font-weight="700" fill="#68757d">Queue</text>
    <text x="532" y="214" font-size="30" font-weight="750" fill="#283038">12</text>
    <text x="532" y="238" font-size="13" fill="#68757d">Pending and retrying</text>
    <rect x="732" y="142" width="196" height="116" rx="8" fill="#ffffff" stroke="#d9e2e5"/>
    <text x="752" y="174" font-size="13" font-weight="700" fill="#68757d">Backups</text>
    <text x="752" y="214" font-size="30" font-weight="750" fill="#088090">Ready</text>
    <text x="752" y="238" font-size="13" fill="#68757d">Last validated today</text>
    <rect x="292" y="292" width="636" height="254" rx="8" fill="#ffffff" stroke="#d9e2e5"/>
    <text x="316" y="330" font-size="16" font-weight="750" fill="#283038">Recent operational events</text>
    <g font-size="13" fill="#68757d">
      <text x="316" y="374">10:42  Queued message delivered upstream</text>
      <text x="316" y="418">10:36  Trusted device accepted from 192.168.1.42</text>
      <text x="316" y="462">10:30  Backup validation succeeded</text>
      <text x="316" y="506">10:14  Microsoft OAuth token acquired</text>
    </g>
    <g stroke="#d9e2e5">
      <line x1="316" y1="390" x2="904" y2="390"/>
      <line x1="316" y1="434" x2="904" y2="434"/>
      <line x1="316" y1="478" x2="904" y2="478"/>
    </g>
  </g>
</svg>
