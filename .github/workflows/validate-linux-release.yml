name: Validate Linux Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to validate, without leading v"
        required: true
        default: "1.0.0-rc.5"
      mode:
        description: "Validation mode"
        required: true
        default: "clean-installer"
        type: choice
        options:
          - clean-installer
          - update-package
          - full-release
          - cleanup-only
      from_version:
        description: "Baseline version for update-package/full-release mode, without leading v"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: linux-release-validation
  cancel-in-progress: false

jobs:
  validate-linux-release:
    runs-on:
      - self-hosted
      - Linux
      - relaywright-install-linux
    environment: linux-installer-test

    env:
      GITHUB_TOKEN: ${{ github.token }}
      RELAYWRIGHT_VALIDATION_MODE: ${{ inputs.mode }}
      RELAYWRIGHT_VALIDATION_VERSION: ${{ inputs.version }}
      RELAYWRIGHT_VALIDATION_FROM_VERSION: ${{ inputs.from_version }}
      RELAYWRIGHT_VALIDATION_REPOSITORY: ${{ github.repository }}
      RELAYWRIGHT_LINUX_RELEASE_VALIDATION_SUDO_PASSWORD: ${{ secrets.RELAYWRIGHT_LINUX_RELEASE_VALIDATION_SUDO_PASSWORD }}

    steps:
      - name: Checkout validation scripts
        uses: actions/checkout@v7

      - name: Validate Linux release
        shell: bash
        run: |
          bash scripts/linux/Invoke-RelaywrightLinuxReleaseValidation.sh \
            --mode "$RELAYWRIGHT_VALIDATION_MODE" \
            --version "$RELAYWRIGHT_VALIDATION_VERSION" \
            --from-version "$RELAYWRIGHT_VALIDATION_FROM_VERSION" \
            --repository "$RELAYWRIGHT_VALIDATION_REPOSITORY" \
            --artifacts-directory "$PWD/artifacts/linux-release-validation"

      - name: Upload validation artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: linux-release-validation-${{ inputs.mode }}-${{ inputs.version }}
          path: artifacts/linux-release-validation
          if-no-files-found: warn
          retention-days: 14
