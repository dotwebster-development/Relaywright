name: CI

on:
  push:
    branches:
      - development
      - main
      - master
  pull_request:

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Relaywright.sln

      - name: Build
        run: dotnet build Relaywright.sln --no-restore

      - name: Test
        run: dotnet test tests/Relaywright.Web.Tests/Relaywright.Web.Tests.csproj --no-build

      - name: Vulnerability report
        run: dotnet list Relaywright.sln package --vulnerable --include-transitive
